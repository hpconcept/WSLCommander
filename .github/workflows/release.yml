name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.1.0

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Build executable with PyInstaller
      run: |
        pyinstaller WSLCommander.spec --noconfirm

    - name: Create zip archive
      run: |
        Compress-Archive -Path dist\WSLCommander\* -DestinationPath WSLCommander-${{ github.ref_name }}.zip
      shell: pwsh

    - name: Get version from tag
      id: get_version
      run: |
        $version = "${{ github.ref_name }}"
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: WSLCommander-${{ github.ref_name }}.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## WSL Commander ${{ steps.get_version.outputs.VERSION }}
          
          Download the zip file below, extract it, and run `WSLCommander.exe`.
          
          ### What's New
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
          
          ### Requirements
          - Windows 10 or Windows 11 with WSL2 enabled
          - [usbipd-win](https://github.com/dorssel/usbipd-win) (optional, for USB sharing)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

